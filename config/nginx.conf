# RStone TCP load balancing example.
#
# Run with a command similar to:
#   nginx -c /absolute/path/to/RStone/config/nginx.conf -p /absolute/path/to/RStone
#
# This uses the stream module to forward raw TCP RPC traffic to Gateway
# processes. Nginx does not understand Region, Leader, or Raft semantics.

worker_processes  1;

events {
    worker_connections  1024;
}

stream {
    upstream rstone_gateways {
        server 127.0.0.1:8081;
        # Add more stateless Gateway processes here:
        # server 127.0.0.1:8082;
        # server 127.0.0.1:8083;
    }

    server {
        listen 18081;
        proxy_pass rstone_gateways;
        proxy_connect_timeout 1s;
        proxy_timeout 10s;
    }
}
